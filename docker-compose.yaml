services:
  server:
    build: .
    container_name: aicards-server
    expose:
      - "3000"
    env_file:
      - config/.env
    restart: always

  nginx:
    image: nginx:stable-alpine
    container_name: aicards-server-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: always